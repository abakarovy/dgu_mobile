name: dgu_mobile
description: "Мобильное приложение Колледж ДГУ."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  go_router: ^17.1.0
  flutter_svg: ^2.2.3
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  permission_handler: ^12.0.0
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  collection: ^1.19.1
  flutter_native_splash: ^2.4.6
  connectivity_plus: ^6.1.4
  web_socket_channel: ^3.0.3
  # Локальная копия: исправлен Dialog.swift (keyWindow deprecated на iOS 13+).
  file_saver:
    path: packages/file_saver

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Патч ios/dummy.m (иначе линковщик: dummy.o has no symbols). См. packages/firebase_core.
dependency_overrides:
  firebase_core:
    path: packages/firebase_core

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/env/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.otf
          weight: 800
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800

flutter_native_splash:
  color: "#FFFFFF"
  # Android/iOS splash must use different center logo images.
  # Center logo (main splash image):
  image_android: assets/splash/android_image.png
  image_ios: assets/splash/ios_image.png

  # Brand (bottom branding image):
  branding_android: assets/splash/android_text.png
  branding_ios: assets/splash/ios_text.png

  # Fallback for platforms where the platform-specific keys are not used.
  image: assets/splash/android_image.png
  branding: assets/splash/android_text.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#FFFFFF"
    # Android 12+ uses the center logo and branding differently.
    image: assets/splash/android_image.png
    branding: assets/splash/android_text.png

# Генерация иконки на рабочем столе: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_app.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo_app.png
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: assets/images/logo_app.png
  macos:
    generate: true
    image_path: assets/images/logo_app.png
