name: dgu_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  go_router: ^17.1.0
  flutter_svg: ^2.2.3
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  permission_handler: ^12.0.0
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  collection: ^1.19.1
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/fonts/
    - assets/env/.env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.otf
          weight: 800
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-ExtraBold.ttf
          weight: 800

flutter_native_splash:
  color: "#003B73"
  # Android/iOS splash must use different center logo images.
  # Center logo (main splash image):
  image_android: assets/splash/android_image.png
  image_ios: assets/splash/ios_image.png

  # Brand (bottom branding image):
  branding_android: assets/splash/android_text.png
  branding_ios: assets/splash/ios_text.png

  # Fallback for platforms where the platform-specific keys are not used.
  image: assets/splash/android_image.png
  branding: assets/splash/android_text.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#003B73"
    # Android 12+ uses the center logo and branding differently.
    image: assets/splash/android_image.png
    branding: assets/splash/android_text.png
